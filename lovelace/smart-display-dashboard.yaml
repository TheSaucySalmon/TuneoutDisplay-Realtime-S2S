title: Smart Display
views:
  - title: Home
    path: default_view
    icon: mdi:tablet-dashboard
    theme: Backend-selected
    cards:
      - type: horizontal-stack
        cards:
          - type: vertical-stack
            cards:
              - type: weather-forecast
                entity: weather.forecast_home
                show_current: true
                show_forecast: false
                name: Home
              - type: grid
                title: Quick Actions
                columns: 2
                square: false
                cards:
                  - type: button
                    name: Good Morning
                    icon: mdi:weather-sunset-up
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      target:
                        entity_id: scene.good_morning
                  - type: button
                    name: Night
                    icon: mdi:weather-night
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      target:
                        entity_id: scene.night
                  - type: button
                    name: Lights On
                    icon: mdi:lightbulb-on
                    tap_action:
                      action: call-service
                      service: light.turn_on
                      target:
                        entity_id: light.jakes_room_1
                  - type: button
                    name: White Noise
                    icon: mdi:sleep
                    tap_action:
                      action: toggle
                    target:
                      entity_id: switch.jakes_whitenoise_machine

          - type: vertical-stack
            cards:
              - type: custom:smart-display-card
                name: Jake's Room
                state_entity: sensor.jake_s_room_assistant_state
                brightness_entity: number.jake_s_room_brightness
                mute_entity: switch.jake_s_room_mute
              - type: entities
                title: Assistant Status
                show_header_toggle: false
                entities:
                  - entity: sensor.jake_s_room_assistant_state
                    name: State
                  - entity: binary_sensor.jake_s_room_assistant_online
                    name: Online
                  - entity: sensor.jake_s_room_assistant_audio_profile
                    name: Audio Profile
                  - entity: sensor.jake_s_room_assistant_audio_input
                    name: Input
                  - entity: sensor.jake_s_room_assistant_audio_output
                    name: Output
                  - entity: binary_sensor.jake_s_room_assistant_audio_input_ready
                    name: Input Ready
                  - entity: binary_sensor.jake_s_room_assistant_audio_output_ready
                    name: Output Ready
