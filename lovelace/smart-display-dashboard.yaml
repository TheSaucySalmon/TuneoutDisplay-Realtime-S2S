# Simple 7-inch smart display dashboard
#
# Edit only these parts:
# 1. Change the entity IDs below to yours
# 2. Change the grid sizes if you want cards bigger/smaller
# 3. Move cards by changing each card's `grid-area`
#
# Required HACS cards used here:
# - layout-card
# - button-card
#
# Example areas:
# "time weather"
# "door solar"
# "media solar"

title: Smart Display
views:
  - title: Home
    path: smart-display
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr
      grid-template-rows: 110px 1fr 150px
      grid-template-areas: |
        "time weather"
        "door solar"
        "media solar"
      grid-gap: 12px
      margin: 10px
      height: calc(100vh - 20px)
    cards:
      - type: custom:button-card
        view_layout:
          grid-area: time
        show_icon: false
        show_state: false
        show_label: true
        name: |
          [[[
            return new Date().toLocaleTimeString([], {
              hour: 'numeric',
              minute: '2-digit'
            });
          ]]]
        label: |
          [[[
            return new Date().toLocaleDateString([], {
              weekday: 'long',
              month: 'long',
              day: 'numeric'
            });
          ]]]
        tap_action:
          action: none
        hold_action:
          action: none
        styles:
          card:
            - height: 110px
            - padding: 0
          grid:
            - grid-template-areas: '"n" "l"'
            - grid-template-columns: 1fr
            - grid-template-rows: 1fr auto
          name:
            - justify-self: center
            - align-self: end
            - text-align: center
            - font-size: 3.2rem
            - font-weight: 700
            - line-height: 1
          label:
            - justify-self: center
            - align-self: start
            - text-align: center
            - font-size: 1rem
            - opacity: 0.8
            - padding-bottom: 14px

      - type: weather-forecast
        view_layout:
          grid-area: weather
        entity: weather.forecast_home
        forecast_type: hourly

      - type: picture-entity
        view_layout:
          grid-area: door
        entity: camera.front_door
        name: Front Door
        camera_view: live
        show_name: true
        show_state: false
        fit_mode: cover
        aspect_ratio: 4:3

      - type: media-control
        view_layout:
          grid-area: media
        entity: media_player.living_room_display

      - type: vertical-stack
        view_layout:
          grid-area: solar
        cards:
          - type: entities
            title: Solar
            show_header_toggle: false
            entities:
              - entity: sensor.solar_power
                name: Current production
              - entity: sensor.solar_energy_today
                name: Today
          - type: history-graph
            title: Solar Trend
            hours_to_show: 12
            refresh_interval: 60
            entities:
              - entity: sensor.solar_power
                name: Solar power
